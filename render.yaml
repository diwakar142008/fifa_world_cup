# StadiumMind AI - Render Deployment Configuration
# This file defines the infrastructure for deploying to Render.
# See https://render.com/docs/yaml-spec for more information.

services:
  # ─── Backend API Service ──────────────────────────────────────
  - type: web
    name: stadiummind-backend
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 4
    healthCheckPath: /health/readiness
    envVars:
      - key: APP_NAME
        value: StadiumMind AI
      - key: APP_VERSION
        value: 1.0.0
      - key: API_PREFIX
        value: /api/v1
      - key: DEBUG
        value: false
      - key: TESTING
        value: false
      - key: USE_MOCK_DATA
        value: true
      - key: LOG_LEVEL
        value: INFO
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRATION_MINUTES
        value: 60
      - key: JWT_REFRESH_EXPIRATION_MINUTES
        value: 10080
      - key: CORS_ORIGINS
        value: https://stadiummind-backend.onrender.com,https://stadium-mind.ai,http://localhost:3000
      - key: JWT_SECRET_KEY
        sync: false # Set in Render dashboard
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false

  # ─── Frontend Web Service ─────────────────────────────────────
  - type: web
    name: stadiummind-frontend
    env: static
    region: oregon
    buildCommand: npm install && npm run build
    staticPublishPath: out
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://stadiummind-backend.onrender.com/api/v1
      - key: NEXT_PUBLIC_WS_URL
        value: wss://stadiummind-backend.onrender.com/ws
      - key: NODE_VERSION
        value: 20
